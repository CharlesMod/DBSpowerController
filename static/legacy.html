<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cube-power</title>
  <style>
    :root {
      --bg: #0e0f12; --card: #181a20; --fg: #e9eaee; --dim: #8a8f9b;
      --ok: #5dd28d; --warn: #e9b94c; --bad: #e25c5c; --accent: #66a6ff;
      --border: #262932;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.4 ui-sans-serif, system-ui, sans-serif;
           background: var(--bg); color: var(--fg); }
    header { padding: 14px 20px; border-bottom: 1px solid var(--border);
             display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: 0.5px; }
    .conn { font-size: 12px; color: var(--dim); }
    .conn .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
                 background: var(--bad); margin-right: 6px; vertical-align: middle; }
    .conn.live .dot { background: var(--ok); }
    .section-title { margin: 0 20px 8px; font-size: 12px; color: var(--dim);
                     text-transform: uppercase; letter-spacing: 1px; }
    main { padding: 12px 20px 20px; display: grid; gap: 16px;
           grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
           max-width: 1400px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px; }
    .card h2 { margin: 0 0 4px 0; font-size: 15px; font-weight: 600; }
    .meta { font-size: 11px; color: var(--dim); margin-bottom: 12px; }
    .soc { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; }
    .soc .pct { font-size: 40px; font-weight: 700; line-height: 1; }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 999px;
             border: 1px solid var(--border); color: var(--dim); }
    .badge.NORMAL, .badge.Charging, .badge.BALANCED { color: var(--ok); border-color: var(--ok); }
    .badge.DUSK { color: var(--accent); border-color: var(--accent); }
    .badge.OVERRIDE, .badge.REBALANCING { color: var(--warn); border-color: var(--warn); }
    .badge.FLOORED, .badge.OFFLINE, .badge.Disconnected { color: var(--bad); border-color: var(--bad); }
    .bar { height: 6px; background: #262932; border-radius: 3px; overflow: hidden;
           margin-bottom: 14px; }
    .bar > div { height: 100%; background: var(--ok); transition: width 300ms ease; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .stat { background: #14151a; border: 1px solid var(--border); border-radius: 6px;
            padding: 7px 9px; }
    .stat .k { font-size: 10px; color: var(--dim); text-transform: uppercase;
               letter-spacing: 0.5px; }
    .stat .v { font-size: 15px; font-weight: 600; margin-top: 2px; }
    .ac { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px; }
    .ac .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--dim); }
    .ac.on .dot { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; }
    button { background: #1f222b; color: var(--fg); border: 1px solid var(--border);
             padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
             font-family: inherit; }
    button:hover { background: #262932; }
    button.primary { background: #2a4a7a; border-color: #335a91; }
    button.danger  { background: #5a2a2a; border-color: #7a3535; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .override-info { font-size: 11px; color: var(--warn); margin-top: 6px; }
    #coord { margin: 14px 20px 0; background: var(--card); border: 1px solid var(--border);
             border-radius: 10px; padding: 14px 16px; max-width: 1360px;
             display: flex; flex-wrap: wrap; gap: 22px; align-items: center; }
    #coord .c-stat .k { font-size: 10px; color: var(--dim); text-transform: uppercase;
                        letter-spacing: 0.5px; }
    #coord .c-stat .v { font-size: 18px; font-weight: 700; margin-top: 2px; }
    #coord.safe { border-color: var(--bad); }
    #log { font-family: ui-monospace, monospace; font-size: 11px; color: var(--dim);
           max-height: 280px; overflow-y: auto; padding: 12px; background: var(--card);
           border: 1px solid var(--border); border-radius: 10px; margin: 0 20px 20px;
           max-width: 1360px; }
    #log .entry { padding: 2px 0; border-bottom: 1px solid #1a1c22;
                  white-space: pre-wrap; word-break: break-all; }
    #log .t { color: #5a5e6a; }
    .empty { padding: 40px; text-align: center; color: var(--dim); }
  </style>
</head>
<body>
  <header>
    <h1>cube-power</h1>
    <span class="conn" id="conn"><span class="dot"></span><span id="conntext">connecting…</span></span>
  </header>

  <div id="coord"><span class="empty">waiting for coordinator…</span></div>

  <h3 class="section-title" style="margin-top:16px;">power stations</h3>
  <main id="cards"><div class="empty">loading…</div></main>

  <h3 class="section-title">decision log</h3>
  <div id="log"></div>

  <script src="/app.js"></script>
</body>
</html>
